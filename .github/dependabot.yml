# Dependabot keeps dependencies fresh and patched by opening PRs automatically.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Frontend (root package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Bundle minor/patch bumps into one PR to cut noise.
      angular:
        patterns: ["@angular*", "@ngrx*"]
      dev-dependencies:
        dependency-type: development
    ignore:
      # Angular majors force a coordinated Node + tooling upgrade — do them
      # deliberately with `ng update`, not via an auto-bump PR.
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@angular-eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "angular-eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript's major is pinned by the Angular compiler — never jump ahead.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # The Node/Express dev proxy
  - package-ecosystem: npm
    directory: "/server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # The GitHub Actions themselves (e.g. actions/checkout versions)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
