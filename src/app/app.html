<nav class="app-nav" aria-label="Main navigation">
  <span class="app-brand">LoL Draft</span>
  <span class="patch-badge" [title]="'League of Legends patch ' + patchVersion">{{ patchVersion }}</span>
  <div class="nav-divider" aria-hidden="true"></div>
  <a routerLink="/draft" routerLinkActive="active" class="nav-link">{{ ls.T().navDraft }}</a>
  <a routerLink="/pool" routerLinkActive="active" class="nav-link">{{ ls.T().navPool }}</a>
  <a routerLink="/puzzle" routerLinkActive="active" class="nav-link">{{ ls.T().navPuzzle }}</a>
  <a routerLink="/abilities" routerLinkActive="active" class="nav-link">{{ ls.T().navQuiz }}</a>
  <a routerLink="/sounds" routerLinkActive="active" class="nav-link">{{ ls.T().navSound }}</a>
  <a routerLink="/settings" routerLinkActive="active" class="nav-link nav-settings" [title]="ls.T().settings" [attr.aria-label]="ls.T().settings">⚙</a>
  <div class="lang-selector" role="group" aria-label="Language">
    <button
      class="lang-btn"
      [class.active]="ls.lang() === 'en'"
      (click)="setLang('en')"
      aria-label="English"
    >EN</button>
    <button
      class="lang-btn"
      [class.active]="ls.lang() === 'es'"
      (click)="setLang('es')"
      aria-label="Español"
    >ES</button>
  </div>
</nav>
@if (!hasApiKey) {
  <div class="api-key-banner" role="alert">
    <span>⚠ {{ ls.T().apiKeyBanner }}</span>
    <a routerLink="/settings" class="banner-link">{{ ls.T().apiKeyBannerCta }} →</a>
  </div>
}
<app-onboarding />
<main>
  <router-outlet />
</main>
