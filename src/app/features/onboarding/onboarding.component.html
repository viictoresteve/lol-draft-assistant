@if (show()) {
  <div class="onboarding-overlay" (click)="dismiss()" aria-modal="true" role="dialog" [attr.aria-label]="ls.T().onbTitle">
    <div class="onboarding-card" (click)="$event.stopPropagation()">

      <div class="onboarding-lang" role="group" aria-label="Language">
        <button
          class="lang-btn"
          [class.active]="ls.lang() === 'en'"
          (click)="setLang('en')"
          aria-label="English"
        >EN</button>
        <button
          class="lang-btn"
          [class.active]="ls.lang() === 'es'"
          (click)="setLang('es')"
          aria-label="Español"
        >ES</button>
      </div>

      <h2 class="onboarding-title">{{ ls.T().onbTitle }}</h2>
      <p class="onboarding-subtitle">{{ ls.T().onbSubtitle }}</p>

      <div class="onboarding-steps">
        <div class="onboarding-step">
          <span class="step-icon">🎯</span>
          <div class="step-content">
            <strong class="step-heading">{{ ls.T().onbStep1Title }}</strong>
            <p class="step-desc">{{ ls.T().onbStep1Desc }}</p>
          </div>
        </div>

        <div class="onboarding-step">
          <span class="step-icon">⚔️</span>
          <div class="step-content">
            <strong class="step-heading">{{ ls.T().onbStep2Title }}</strong>
            <p class="step-desc">{{ ls.T().onbStep2Desc }}</p>
          </div>
        </div>

        <div class="onboarding-step">
          <span class="step-icon">🤖</span>
          <div class="step-content">
            <strong class="step-heading">{{ ls.T().onbStep3Title }}</strong>
            <p class="step-desc">{{ ls.T().onbStep3Desc }}</p>
          </div>
        </div>
      </div>

      <button class="onboarding-btn" (click)="dismiss()">{{ ls.T().onbGotIt }}</button>
    </div>
  </div>
}
