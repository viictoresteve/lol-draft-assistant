<div class="role-sections">
  @for (role of roles; track role) {
    <div
      class="role-section"
      [class.active-role]="activeRole() === role"
      [id]="'pool-' + role"
    >
      <div class="role-header">
        <span [class]="'role-label role-' + role">{{ role }}</span>
        <span class="role-count">{{ byRole()[role].length }}</span>
      </div>

      @if (byRole()[role].length > 0) {
        <div class="champ-grid" role="list">
          @for (champion of byRole()[role]; track champion.id) {
            <div class="pool-card" role="listitem">
              <img
                [src]="champion.image"
                [alt]="champion.name"
                width="52"
                height="52"
                class="avatar"
                loading="lazy"
                decoding="async"
              />
              <span class="name">{{ champion.name }}</span>
              <button
                class="remove-btn"
                (click)="remove(champion.id, role)"
                [attr.aria-label]="ls.T().remove + ' ' + champion.name"
              >✕</button>
            </div>
          }
        </div>
      } @else {
        <p class="empty-role">{{ ls.T().poolEmpty }}</p>
      }
    </div>
  }
</div>
