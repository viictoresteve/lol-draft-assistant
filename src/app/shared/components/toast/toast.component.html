@if (toast.toasts().length > 0) {
  <div class="toast-stack" role="region" aria-label="Notifications" aria-live="polite">
    @for (t of toast.toasts(); track t.id) {
      <div class="toast" [class]="'toast-' + t.type" role="alert">
        <span class="toast-icon" aria-hidden="true">{{ icons[t.type] }}</span>
        <span class="toast-msg">{{ t.message }}</span>
        <button class="toast-close" (click)="toast.dismiss(t.id)" aria-label="Dismiss">✕</button>
      </div>
    }
  </div>
}
